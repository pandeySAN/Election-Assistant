services:
  # ─── Backend Web Service ───────────────────────────────────────────────────
  - type: web
    name: election-assistant-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false          # You must set this manually in the Render dashboard
      - key: GROQ_API_KEY
        sync: false          # You must set this manually in the Render dashboard
      # Optional — leave blank to use the built-in in-memory fallback
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      # Set to your Render frontend URL, e.g. https://election-assistant-frontend.onrender.com
      - key: CORS_ORIGIN
        sync: false

  # ─── Frontend Static Site ──────────────────────────────────────────────────
  - type: web
    name: election-assistant-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to your backend URL, e.g. https://election-assistant-backend.onrender.com/api
      - key: VITE_APP_NAME
        value: ElectBot
      - key: VITE_APP_VERSION
        value: "2.0.0"
